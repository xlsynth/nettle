# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24.16.0
  PRE_COMMIT_VERSION: 4.6.0
  PRE_COMMIT_SHA256: ea8a0c84902e48c1875558f2f362ed8476773aa5fc8c16c5d8f2acc2a2830a65

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies with npm ci
        run: npm ci

      - name: Download pinned pre-commit
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/pre-commit/pre-commit/releases/download/v${PRE_COMMIT_VERSION}/pre-commit-${PRE_COMMIT_VERSION}.pyz" \
            --output /tmp/pre-commit.pyz
          echo "${PRE_COMMIT_SHA256}  /tmp/pre-commit.pyz" | sha256sum --check --strict

      - name: Run pre-commit
        env:
          SKIP: clippy,biome,web-test
        run: python3 /tmp/pre-commit.pyz run --all-files --show-diff-on-failure

  cargo-test:
    name: cargo test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run cargo test
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  npm-test:
    name: npm test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies with npm ci
        run: npm ci

      - name: Run npm lint
        run: npm run lint

      - name: Run npm test
        run: npm test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and run the integration test target
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          # The precompiled Slang and yosys-slang toolchains currently support
          # linux/amd64 only, so this target cannot yet run on linux/arm64.
          target: integration-tests
          platforms: linux/amd64
          build-args: |
            NETTLE_BUILD_DATE_UTC=${{ steps.build-info.outputs.date_utc }}
            NETTLE_BUILD_GIT_SHA=${{ github.sha }}
            NETTLE_BUILD_STATE=${{ steps.build-info.outputs.state }}
            NETTLE_PUBLIC_MODE=hosted
          push: false
          cache-from: type=gha,scope=nettle-integration-tests
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=nettle-integration-tests' || '' }}

  image-build:
    name: Build nettle image (amd64)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          target: nettle
          platforms: linux/amd64
          load: true
          build-args: |
            NETTLE_BUILD_DATE_UTC=${{ steps.build-info.outputs.date_utc }}
            NETTLE_BUILD_GIT_SHA=${{ github.sha }}
            NETTLE_BUILD_STATE=${{ steps.build-info.outputs.state }}
            NETTLE_PUBLIC_MODE=hosted
          # Publish only the tested image manifests. BuildKit provenance
          # attestations appear as unknown/unknown entries in GHCR's platform
          # view and are not part of the runnable multi-platform image.
          provenance: false
          tags: nettle-nettle:${{ github.sha }}
          cache-from: type=gha,scope=nettle-amd64
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=nettle-amd64' || '' }}

      - name: Smoke-test nettle image
        run: |
          set -euo pipefail
          # Build the smoke HDL design through `nettle render`, then confirm
          # that the image serves both its health check and startup bundle.
          container=nettle-smoke
          trap 'docker logs "$container"; docker rm --force "$container" || true' EXIT
          docker run --detach --name "$container" \
            --user 10001:10001 \
            -p 127.0.0.1:8080:8080 \
            -v "$PWD:/work:ro" -w /work \
            "nettle-nettle:${{ github.sha }}" render \
            --filelist integration_tests/smoke/project.f \
            --project-root integration_tests/smoke \
            --top top \
            --output /tmp/nettle-smoke.nettle
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/healthz; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:8080/startup.nettle --output /dev/null

      - name: Smoke-test hosted source workflow
        run: scripts/check-hosted-image.sh "nettle-nettle:${{ github.sha }}"

      - name: Save tested image
        run: docker save "nettle-nettle:${{ github.sha }}" --output /tmp/nettle-amd64.tar

      - name: Upload tested image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nettle-amd64-image
          path: /tmp/nettle-amd64.tar
          if-no-files-found: error
          retention-days: 1

  publish-context:
    name: Resolve published image tag
    if: >-
      success() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    needs:
      - pre-commit
      - cargo-test
      - npm-test
      - integration-tests
      - image-build
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    runs-on: ubuntu-24.04
    steps:
      - name: Create dated immutable tag
        id: tag
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: echo "image_tag=$(date --utc +%F)-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  publish-images:
    name: Publish nettle image
    needs:
      - publish-context
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04

    steps:
      - name: Download tested image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nettle-amd64-image
          path: /tmp/images

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish tested image
        env:
          IMAGE: ghcr.io/xlsynth/nettle
          LOCAL_IMAGE: nettle-nettle:${{ github.sha }}
          IMAGE_TAG: ${{ needs.publish-context.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker load --input /tmp/images/nettle-amd64.tar
          dated_image="${IMAGE}:${IMAGE_TAG}"
          latest_image="${IMAGE}:latest"
          docker tag "$LOCAL_IMAGE" "$dated_image"
          docker tag "$LOCAL_IMAGE" "$latest_image"
          docker push "$dated_image"
          docker push "$latest_image"

  pages-build:
    name: Build Nettle demo Pages artifact
    needs:
      - image-build
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure GitHub Pages
        id: pages_config
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Resolve Pages base path
        id: pages
        env:
          CONFIGURED_BASE_PATH: ${{ steps.pages_config.outputs.base_path }}
        run: |
          base_path="$CONFIGURED_BASE_PATH"
          if [ -z "$base_path" ]; then
            base_path="/${GITHUB_REPOSITORY#*/}"
          fi
          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked web dependencies
        run: npm ci

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Build static viewer
        env:
          NETTLE_BUILD_DATE_UTC: ${{ steps.build-info.outputs.date_utc }}
          NETTLE_BUILD_GIT_SHA: ${{ github.sha }}
          NETTLE_BUILD_STATE: ${{ steps.build-info.outputs.state }}
          NETTLE_PUBLIC_BASE: ${{ steps.pages.outputs.base_path }}/
          NETTLE_PUBLIC_MODE: static
        run: npm run build

      - name: Download tested Nettle image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nettle-amd64-image
          path: /tmp/nettle-image

      - name: Build and validate public integration demos
        run: |
          set -euo pipefail
          python3 scripts/check-design-corpus.py \
            --prepare-only \
            --corpus bedrock-rtl \
            --example cdc-fifo-synth-netlist \
            --workspace target/design-corpora
          docker load --input /tmp/nettle-image/nettle-amd64.tar
          image="nettle-nettle:${{ github.sha }}"
          mkdir -p web/dist/demos
          build_bundle() {
            output="$1"
            filelist="$2"
            project_root="$3"
            top="$4"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$image" build \
              --filelist "$filelist" --project-root "$project_root" --top "$top" \
              --output "$output"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$image" validate "$output"
          }
          docker run --rm --user "$(id -u):$(id -g)" \
            --entrypoint yosys \
            -v "$PWD:/work" -w /work/target/design-corpora/bedrock-rtl "$image" \
            -Q -m slang -s scripts/synth_br_cdc_fifo_flops.ys
          build_bundle \
            web/dist/demos/br_cdc_fifo_flops_synth.nettle \
            target/design-corpora/bedrock-rtl/br_cdc_fifo_flops_synth.f \
            target/design-corpora/bedrock-rtl \
            br_cdc_fifo_flops
          build_bundle web/dist/demos/schematic-reference.nettle integration_tests/schematic-diff/reference/project.f integration_tests/schematic-diff/reference top
          build_bundle web/dist/demos/schematic-candidate.nettle integration_tests/schematic-diff/candidate/project.f integration_tests/schematic-diff/candidate top
          expected_demo_files="$(printf '%s\n' \
            br_cdc_fifo_flops_synth.nettle \
            schematic-candidate.nettle \
            schematic-reference.nettle)"
          actual_demo_files="$(find web/dist/demos -maxdepth 1 -type f -printf '%f\n' | sort)"
          test "$actual_demo_files" = "$expected_demo_files"

      - name: Open public examples beneath the Pages base path
        env:
          NETTLE_PUBLIC_BASE: ${{ steps.pages.outputs.base_path }}/
          NETTLE_PUBLIC_MODE: static
        run: |
          playwright_image="mcr.microsoft.com/playwright:v1.61.0-noble@sha256:111dde95859f2c659291cb60e698f9048a8fc30b35b4ddb7c90f9cb5b73062d9"
          docker run --rm --ipc=host \
            --env NETTLE_PUBLIC_BASE \
            --env NETTLE_PUBLIC_MODE \
            --volume "$PWD:/work" \
            --workdir /work/web \
            "$playwright_image" \
            ../node_modules/.bin/playwright test --config playwright.pages.config.ts

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: web/dist

  pages-deploy:
    name: Deploy Nettle demo GitHub Pages
    needs:
      - pages-build
      - publish-context
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
