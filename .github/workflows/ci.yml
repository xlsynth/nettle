# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24.16.0
  PRE_COMMIT_VERSION: 4.6.0
  PRE_COMMIT_SHA256: ea8a0c84902e48c1875558f2f362ed8476773aa5fc8c16c5d8f2acc2a2830a65

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies with npm ci
        run: npm ci

      - name: Download pinned pre-commit
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/pre-commit/pre-commit/releases/download/v${PRE_COMMIT_VERSION}/pre-commit-${PRE_COMMIT_VERSION}.pyz" \
            --output /tmp/pre-commit.pyz
          echo "${PRE_COMMIT_SHA256}  /tmp/pre-commit.pyz" | sha256sum --check --strict

      - name: Run pre-commit
        run: python3 /tmp/pre-commit.pyz run --all-files --show-diff-on-failure

  cargo-test:
    name: cargo test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run cargo test
        run: cargo test --workspace --all-targets --all-features --locked

  npm-test:
    name: npm test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies with npm ci
        run: npm ci

      - name: Run npm test
        run: npm test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and run the integration test target
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          # The precompiled Slang and yosys-slang toolchains currently support
          # linux/amd64 only, so this target cannot yet run on linux/arm64.
          target: integration-tests
          platforms: linux/amd64
          build-args: |
            NETTLE_BUILD_DATE_UTC=${{ steps.build-info.outputs.date_utc }}
            NETTLE_BUILD_GIT_SHA=${{ github.sha }}
            NETTLE_BUILD_STATE=${{ steps.build-info.outputs.state }}
          push: false
          cache-from: type=gha,scope=nettle-integration-tests
          cache-to: type=gha,mode=max,scope=nettle-integration-tests

  image-build:
    name: Build ${{ matrix.image }} image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The precompiled Slang and yosys-slang toolchains currently support
          # Builder and combined images are linux/amd64 only; the viewer is
          # built and published for linux/amd64 and linux/arm64.
          - image: nettle-builder
            dockerfile: Dockerfile
            target: builder
            arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          # Combined compiler-and-viewer runtime published as ghcr.io/xlsynth/nettle.
          - image: nettle
            dockerfile: Dockerfile
            target: nettle
            arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - image: nettle-viewer
            dockerfile: Dockerfile
            target: viewer
            arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - image: nettle-viewer
            dockerfile: Dockerfile
            target: viewer
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          load: true
          build-args: |
            NETTLE_BUILD_DATE_UTC=${{ steps.build-info.outputs.date_utc }}
            NETTLE_BUILD_GIT_SHA=${{ github.sha }}
            NETTLE_BUILD_STATE=${{ steps.build-info.outputs.state }}
          # Publish only the tested image manifests. BuildKit provenance
          # attestations appear as unknown/unknown entries in GHCR's platform
          # view and are not part of the runnable multi-platform image.
          provenance: false
          tags: nettle-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Smoke-test combined image
        if: matrix.image == 'nettle'
        run: |
          set -euo pipefail
          # Build the smoke HDL design through `nettle render`, then confirm
          # that the image serves both its health check and startup bundle.
          container=nettle-smoke
          trap 'docker logs "$container"; docker rm --force "$container" || true' EXIT
          docker run --detach --name "$container" \
            --user 10001:10001 \
            -p 127.0.0.1:8080:8080 \
            -v "$PWD:/work:ro" -w /work \
            "nettle-${{ matrix.image }}:${{ github.sha }}" render \
            --filelist integration_tests/smoke/project.f \
            --project-root integration_tests/smoke \
            --top top \
            --output /tmp/nettle-smoke.nettle
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/healthz; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:8080/startup.nettle --output /dev/null

      - name: Save tested image
        run: docker save "nettle-${{ matrix.image }}:${{ github.sha }}" --output "/tmp/${{ matrix.image }}-${{ matrix.arch }}.tar"

      - name: Upload tested image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.image }}-${{ matrix.arch }}-image
          path: /tmp/${{ matrix.image }}-${{ matrix.arch }}.tar
          if-no-files-found: error
          retention-days: 1

  publish-context:
    name: Resolve published image tag
    if: >-
      success() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    needs:
      - pre-commit
      - cargo-test
      - npm-test
      - integration-tests
      - image-build
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    runs-on: ubuntu-24.04
    steps:
      - name: Create dated immutable tag
        id: tag
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: echo "image_tag=$(date --utc +%F)-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  publish-images:
    name: Publish ${{ matrix.image }} image
    needs:
      - publish-context
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The precompiled Slang and yosys-slang toolchains currently support
          # Builder and combined images are linux/amd64 only; the viewer is
          # built and published for linux/amd64 and linux/arm64.
          - image: nettle-builder
            runner: ubuntu-24.04
          - image: nettle
            runner: ubuntu-24.04
          - image: nettle-viewer
            runner: ubuntu-24.04

    steps:
      - name: Download tested images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ${{ matrix.image }}-*-image
          path: /tmp/images
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish tested architecture images
        env:
          IMAGE: ghcr.io/xlsynth/${{ matrix.image }}
          LOCAL_IMAGE: nettle-${{ matrix.image }}:${{ github.sha }}
          IMAGE_TAG: ${{ needs.publish-context.outputs.image_tag }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          archives=(/tmp/images/${{ matrix.image }}-*.tar)
          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No tested image archives found" >&2
            exit 1
          fi
          for archive in "${archives[@]}"; do
            docker load --input "$archive"
            image="${IMAGE}:${IMAGE_TAG}"
            docker tag "$LOCAL_IMAGE" "$image"
            docker push "$image"
            digest="$(docker image inspect --format='{{index .RepoDigests 0}}' "$image" | sed 's/.*@//')"
            touch "/tmp/digests/${digest#sha256:}"
          done

      - name: Upload image digests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.image }}-digest
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifests:
    name: Publish ${{ matrix.image }} manifest
    if: >-
      success() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    needs:
      - publish-context
      - publish-images
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nettle-builder
          - image: nettle
          - image: nettle-viewer

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ matrix.image }}-digest
          path: /tmp/digests

      - name: Publish manifest
        env:
          IMAGE: ghcr.io/xlsynth/${{ matrix.image }}
          IMAGE_TAG: ${{ needs.publish-context.outputs.image_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          digests=(/tmp/digests/*)
          if [ "${#digests[@]}" -eq 0 ]; then
            echo "No image digests found" >&2
            exit 1
          fi
          sources=()
          for digest in "${digests[@]}"; do
            sources+=("${IMAGE}@sha256:$(basename "$digest")")
          done
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${IMAGE_TAG}" \
            "${sources[@]}"

  pages-build:
    name: Build Nettle demo Pages artifact
    needs:
      - publish-context
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked web dependencies
        run: npm ci

      - name: Record software build metadata
        id: build-info
        run: |
          state=clean
          if [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            state=dirty
          elif ! git for-each-ref --contains HEAD --format='%(refname)' \
            refs/heads/main refs/remotes | grep -Eq '(^refs/heads/main$|^refs/remotes/.+/main$)'; then
            state=dev
          fi
          echo "date_utc=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "state=${state}" >> "$GITHUB_OUTPUT"

      - name: Build static viewer
        env:
          NETTLE_BUILD_DATE_UTC: ${{ steps.build-info.outputs.date_utc }}
          NETTLE_BUILD_GIT_SHA: ${{ github.sha }}
          NETTLE_BUILD_STATE: ${{ steps.build-info.outputs.state }}
          NETTLE_PUBLIC_BASE: ${{ steps.pages.outputs.base_path }}/
          NETTLE_PUBLIC_DEMOS: "true"
        run: npm run build

      - name: Download tested Nettle builder image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nettle-builder-amd64-image
          path: /tmp/nettle-builder-image

      - name: Build and validate public integration demos
        run: |
          set -euo pipefail
          docker load --input /tmp/nettle-builder-image/nettle-builder-amd64.tar
          image="nettle-nettle-builder:${{ github.sha }}"
          mkdir -p web/dist/demos
          build_bundle() {
            output="$1"
            filelist="$2"
            project_root="$3"
            top="$4"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$image" build \
              --filelist "$filelist" --project-root "$project_root" --top "$top" \
              --output "$output"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$image" validate "$output"
          }
          build_bundle web/dist/demos/smoke.nettle integration_tests/smoke/project.f integration_tests/smoke top
          build_bundle web/dist/demos/generate.nettle integration_tests/generate/project.f integration_tests/generate top
          build_bundle web/dist/demos/schematic-reference.nettle integration_tests/schematic-diff/reference/project.f integration_tests/schematic-diff/reference top
          build_bundle web/dist/demos/schematic-candidate.nettle integration_tests/schematic-diff/candidate/project.f integration_tests/schematic-diff/candidate top

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: web/dist

  pages-deploy:
    name: Deploy Nettle demo GitHub Pages
    needs:
      - pages-build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
