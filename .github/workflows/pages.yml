# SPDX-License-Identifier: Apache-2.0

name: Deploy Nettle demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: 24.16.0

jobs:
  build:
    name: Build demo artifact
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked web dependencies
        run: npm ci

      - name: Build static viewer
        env:
          NETTLE_PUBLIC_BASE: ${{ steps.pages.outputs.base_path }}/
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build the pinned Nettle compiler image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          target: builder
          platforms: linux/amd64
          load: true
          provenance: false
          tags: nettle-pages-builder:${{ github.sha }}
          cache-from: type=gha,scope=nettle-pages-builder
          cache-to: type=gha,mode=max,scope=nettle-pages-builder

      - name: Build and validate public integration demos
        env:
          IMAGE: nettle-pages-builder:${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p web/dist/demos
          build_bundle() {
            output="$1"
            filelist="$2"
            project_root="$3"
            top="$4"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$IMAGE" build \
              --filelist "$filelist" --project-root "$project_root" --top "$top" \
              --output "$output"
            docker run --rm --user "$(id -u):$(id -g)" \
              -v "$PWD:/work" -w /work "$IMAGE" validate "$output"
          }
          build_bundle web/dist/demos/smoke.nettle integration_tests/smoke/project.f integration_tests/smoke top
          build_bundle web/dist/demos/schematic-reference.nettle integration_tests/schematic-diff/reference/project.f integration_tests/schematic-diff/reference top
          build_bundle web/dist/demos/schematic-candidate.nettle integration_tests/schematic-diff/candidate/project.f integration_tests/schematic-diff/candidate top

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: web/dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
